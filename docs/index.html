<!doctype html>
<html lang="en">

  #root { position: fixed; inset: 0; }

<body>
<div id="root" data-screen-label="Swap progress"></div>

  try { localStorage.removeItem('swap-progress:t'); } catch (_) {}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

// ── Easing functions ─────────────────────────────────────────────────────────
const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// ── Timeline context ─────────────────────────────────────────────────────────
const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Stage ────────────────────────────────────────────────────────────────────
function Stage({ width = 1280, height = 720, duration = 10, background = '#f6f4ef',
  loop = true, autoplay = true, persistKey = 'animstage', children }) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(el.clientWidth / width, (el.clientHeight - barH) / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
      else if (e.code === 'ArrowLeft') setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.code === 'ArrowRight') setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.key === '0' || e.code === 'Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div ref={stageRef} style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#0a0a0a', fontFamily: 'Inter, system-ui, sans-serif',
    }}>
      <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'center',
        justifyContent: 'center', overflow: 'hidden', minHeight: 0 }}>
        <div ref={canvasRef} style={{
          width, height, background, position: 'relative',
          transform: `scale(${scale})`, transformOrigin: 'center',
          flexShrink: 0, boxShadow: '0 20px 60px rgba(0,0,0,0.4)', overflow: 'hidden',
        }}>
          <TimelineContext.Provider value={ctxValue}>{children}</TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar time={displayTime} actualTime={time} duration={duration} playing={playing}
        onPlayPause={() => setPlaying(p => !p)} onReset={() => setTime(0)}
        onSeek={(t) => setTime(t)} onHover={(t) => setHoverTime(t)} />
    </div>
  );
}

// ── Playback bar ─────────────────────────────────────────────────────────────
function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    return clamp((e.clientX - rect.left) / rect.width, 0, 1) * duration;
  }, [duration]);
  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    dragging ? onSeek(timeFromEvent(e)) : onHover(timeFromEvent(e));
  };
  const onTrackDown = (e) => { setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };
  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('mousemove', onMove); };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60), s = Math.floor(total % 60), cs = Math.floor((total * 100) % 100);
    return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  };
  const mono = 'JetBrains Mono, ui-monospace, monospace';

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)', borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%', maxWidth: 680, alignSelf: 'center', borderRadius: 8,
      color: '#f6f4ef', fontFamily: 'Inter, system-ui, sans-serif', userSelect: 'none', flexShrink: 0 }}>
      <IconButton onClick={onReset} title="Return to start">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing
          ? <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/></svg>
          : <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>
        }
      </IconButton>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums', width: 64, textAlign: 'right', color: '#f6f4ef' }}>{fmt(time)}</div>
      <div ref={trackRef} onMouseMove={onTrackMove} onMouseLeave={() => { if (!dragging) onHover(null); }}
        onMouseDown={onTrackDown}
        style={{ flex: 1, height: 22, position: 'relative', cursor: 'pointer', display: 'flex', alignItems: 'center' }}>
        <div style={{ position: 'absolute', left: 0, right: 0, height: 4, background: 'rgba(255,255,255,0.12)', borderRadius: 2 }}/>
        <div style={{ position: 'absolute', left: 0, width: `${pct}%`, height: 4, background: 'oklch(72% 0.12 250)', borderRadius: 2 }}/>
        <div style={{ position: 'absolute', left: `${pct}%`, top: '50%', width: 12, height: 12, marginLeft: -6, marginTop: -6, background: '#fff', borderRadius: 6, boxShadow: '0 2px 4px rgba(0,0,0,0.4)' }}/>
      </div>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums', width: 64, textAlign: 'left', color: 'rgba(246,244,239,0.55)' }}>{fmt(duration)}</div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)', borderRadius: 6, color: '#f6f4ef',
        cursor: 'pointer', padding: 0, transition: 'background 120ms' }}>
      {children}
    </button>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// SWAP PROGRESS ANIMATION
// ════════════════════════════════════════════════════════════════════════════

const STAGE_W = 1920, STAGE_H = 1080;
const CX = 960, CY = 600, RADIUS = 270;
const TOTAL_DURATION = 23;

function nodeXY(deg) {
  const rad = (deg * Math.PI) / 180;
  return { x: CX + RADIUS * Math.sin(rad), y: CY - RADIUS * Math.cos(rad) };
}

const MAKERS = [
  { id: 'M1', label: 'MAKER 01', angle: 90,  tor: '7g5z2xskmnvp···xqj4.onion', fee: '0.030% + 250 sats', bond: 'bond a1f2···d2e7e8a3', tipSide: 'right' },
  { id: 'M2', label: 'MAKER 02', angle: 180, tor: 'kj4mn5pqrstu···nop6.onion', fee: '0.025% + 200 sats', bond: 'bond 8b2c···f6e3a7c5', tipSide: 'bottom' },
  { id: 'M3', label: 'MAKER 03', angle: 270, tor: 'xy7z8a9bcdef···67vh.onion', fee: '0.035% + 300 sats', bond: 'bond 2d5e···c4b8f1e3', tipSide: 'left' },
];

const T = {
  walletIn:   [0.2, 1.0],
  makerIn:    { M1: [0.8, 1.6], M2: [1.2, 2.0], M3: [1.6, 2.4] },
  handshake:  { M1: [2.6, 4.6], M2: [4.4, 6.4], M3: [6.2, 8.2] },
  phase1End:  8.5,
  contract:   { M1: [9.0, 10.5], M2: [10.5, 12.0], M3: [12.0, 13.5] },
  phase2End:  14.0,
  blinkStart: 14.0,
  packet:     [15.0, 19.8],
  greenFlip:  [19.8, 21.0],
  completeIn: 21.0,
};

const PHASES = [
  { from: 0,    to: 8.5,            step: 1, label: 'Handshake',              color: '#5b8def' },
  { from: 8.5,  to: 14.0,           step: 2, label: 'Contract Establishment', color: '#ffb547' },
  { from: 14.0, to: TOTAL_DURATION, step: 3, label: 'Settlement',             color: '#2fbf71' },
];

function currentPhase(t) {
  for (const p of PHASES) if (t < p.to) return p;
  return PHASES[PHASES.length - 1];
}

const COLORS = {
  hazy:  { r: 108, g: 108, b: 114 },
  blue:  { r:  91, g: 141, b: 239 },
  amber: { r: 255, g: 181, b:  71 },
  green: { r:  47, g: 191, b: 113 },
};
const lerp = (a, b, t) => a + (b - a) * t;
const lerpRGB = (c1, c2, t) => ({
  r: Math.round(lerp(c1.r, c2.r, t)),
  g: Math.round(lerp(c1.g, c2.g, t)),
  b: Math.round(lerp(c1.b, c2.b, t)),
});
const rgb = (c, a = 1) => a === 1 ? `rgb(${c.r},${c.g},${c.b})` : `rgba(${c.r},${c.g},${c.b},${a})`;

function makerProgress(t, m) {
  const [hs0, hs1] = T.handshake[m.id];
  const hsP = clamp((t - hs0) / (hs1 - hs0), 0, 1);
  const [ct0, ct1] = T.contract[m.id];
  const ctP = clamp((t - ct0) / (ct1 - ct0), 0, 1);
  const [gr0, gr1] = T.greenFlip;
  const grP = clamp((t - gr0) / (gr1 - gr0), 0, 1);
  let tone = COLORS.hazy;
  if (hsP > 0) tone = lerpRGB(COLORS.hazy, COLORS.blue, hsP);
  if (ctP > 0) tone = lerpRGB(COLORS.blue, COLORS.amber, ctP);
  if (grP > 0) tone = lerpRGB(COLORS.amber, COLORS.green, grP);
  return { tone, hsP, ctP, grP };
}

function Backdrop() {
  return (
    <div style={{ position: 'absolute', inset: 0, background: `
      radial-gradient(ellipse 1200px 800px at 50% 55%, rgba(91,141,239,0.10), transparent 70%),
      radial-gradient(circle at 50% 50%, #0d0d12 0%, #08080a 75%)` }}>
      <div style={{ position: 'absolute', inset: 0,
        backgroundImage: 'radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px)',
        backgroundSize: '36px 36px', opacity: 0.6,
        maskImage: 'radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%)',
        WebkitMaskImage: 'radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%)' }} />
    </div>
  );
}

function Chrome() {
  return (
    <React.Fragment>
      <div style={{ position: 'absolute', top: 36, left: 44, display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ width: 32, height: 32, borderRadius: 8, background: '#5b8def',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 17, fontWeight: 800,
          color: '#08080a', letterSpacing: '-0.03em' }}>C</div>
        <div style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 14, letterSpacing: '0.04em', color: '#f5f5f7' }}>
          coinswap<span style={{ color: '#6c6c72' }}> · taker</span>
        </div>
      </div>
      <div style={{ position: 'absolute', top: 40, right: 44, display: 'flex', alignItems: 'center', gap: 10,
        fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 11, letterSpacing: '0.10em',
        color: '#a7a7ad', textTransform: 'uppercase' }}>
        <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#2fbf71',
          boxShadow: '0 0 8px #2fbf71', animation: 'sp-pulse 2.4s ease-in-out infinite', display: 'inline-block' }} />
        Mainnet · Block 824,517
      </div>
    </React.Fragment>
  );
}

function Header() {
  const t = useTime();
  const phase = currentPhase(t);
  const prog = clamp(t / TOTAL_DURATION, 0, 1);
  return (
    <div style={{ position: 'absolute', top: 108, left: 0, right: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
      <div style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 11,
        letterSpacing: '0.14em', color: '#6c6c72', textTransform: 'uppercase' }}>
        Step {phase.step} of 3 · Swap in progress
      </div>
      <div key={phase.label} style={{ marginTop: 10,
        fontFamily: '-apple-system, "SF Pro Display", sans-serif',
        fontSize: 48, fontWeight: 700, letterSpacing: '-0.035em',
        color: '#f5f5f7', textAlign: 'center', lineHeight: 1.1,
        animation: 'sp-fadein 380ms ease' }}>
        {phase.label}<span style={{ color: phase.color }}>.</span>
      </div>
      <div style={{ marginTop: 22, width: 460, height: 6, borderRadius: 999,
        background: 'rgba(255,255,255,0.06)', position: 'relative', overflow: 'hidden',
        border: '1px solid rgba(255,255,255,0.04)' }}>
        <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${prog * 100}%`,
          background: 'linear-gradient(90deg, #5b8def 0%, #7da3f5 100%)',
          boxShadow: '0 0 14px rgba(91,141,239,0.65)' }} />
      </div>
    </div>
  );
}

function RouteCircle({ hoverMaker }) {
  const t = useTime();
  const CIRC = 2 * Math.PI * RADIUS;

  let arcTone = COLORS.blue;
  if (t >= T.phase1End) arcTone = lerpRGB(COLORS.blue, COLORS.amber, clamp((t - T.phase1End) / 1.5, 0, 1));
  const [gr0, gr1] = T.greenFlip;
  const grP = clamp((t - gr0) / (gr1 - gr0), 0, 1);
  if (grP > 0) arcTone = lerpRGB(COLORS.amber, COLORS.green, grP);

  const [pk0, pk1] = T.packet;
  const pkLocal = clamp((t - pk0) / (pk1 - pk0), 0, 1);
  const packetActive = t >= pk0 && t <= pk1 + 0.4;

  const packetAngle = (() => {
    const stops = [
      [0.00, 0.22,   0,  90], [0.22, 0.30,  90,  90],
      [0.30, 0.52,  90, 180], [0.52, 0.60, 180, 180],
      [0.60, 0.82, 180, 270], [0.82, 0.90, 270, 270],
      [0.90, 1.00, 270, 360],
    ];
    for (const [p0, p1, a0, a1] of stops) {
      if (pkLocal >= p0 && pkLocal <= p1) {
        const local = p1 === p0 ? 0 : (pkLocal - p0) / (p1 - p0);
        return a0 + (a1 - a0) * Easing.easeInOutCubic(local);
      }
    }
    return pkLocal < 0 ? 0 : 360;
  })();

  let litLen = 0;
  if (t >= pk0) litLen = (packetAngle / 360) * CIRC;
  if (t >= gr1) litLen = CIRC;

  const packetPos = nodeXY(packetAngle);

  let hoverLink = null;
  if (hoverMaker) {
    const m = MAKERS.find((x) => x.id === hoverMaker);
    const p = nodeXY(m.angle), w = nodeXY(0);
    hoverLink = <line x1={w.x} y1={w.y} x2={p.x} y2={p.y}
      stroke="rgba(91,141,239,0.30)" strokeWidth="1.2" strokeDasharray="4 6" />;
  }

  return (
    <svg width={STAGE_W} height={STAGE_H} viewBox={`0 0 ${STAGE_W} ${STAGE_H}`}
      style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      <defs>
        <radialGradient id="sp-packetGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={rgb(arcTone, 1)} />
          <stop offset="40%" stopColor={rgb(arcTone, 0.6)} />
          <stop offset="100%" stopColor={rgb(arcTone, 0)} />
        </radialGradient>
      </defs>
      <circle cx={CX} cy={CY} r={RADIUS + 28} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
      <circle cx={CX} cy={CY} r={RADIUS} fill="none" stroke="rgba(255,255,255,0.10)" strokeWidth="1.5" strokeDasharray="5 10" />
      <g transform={`rotate(-90 ${CX} ${CY})`}>
        <circle cx={CX} cy={CY} r={RADIUS} fill="none" stroke={rgb(arcTone)} strokeWidth="2.5"
          strokeLinecap="round" strokeDasharray={`${litLen} ${CIRC + 100}`}
          style={{ filter: `drop-shadow(0 0 6px ${rgb(arcTone, 0.7)})`, transition: 'stroke 250ms linear' }} />
      </g>
      {hoverLink}
      {packetActive && <circle cx={packetPos.x} cy={packetPos.y} r="40" fill="url(#sp-packetGlow)" opacity="0.85" />}
      {packetActive && (
        <React.Fragment>
          <circle cx={packetPos.x} cy={packetPos.y} r="11" fill={rgb(arcTone)} style={{ filter: `drop-shadow(0 0 14px ${rgb(arcTone, 0.95)})` }} />
          <circle cx={packetPos.x} cy={packetPos.y} r="5" fill="#ffffff" opacity="0.9" />
        </React.Fragment>
      )}
    </svg>
  );
}

function Wallet() {
  const t = useTime();
  const [a0, a1] = T.walletIn;
  const appearP = clamp((t - a0) / (a1 - a0), 0, 1);
  if (appearP <= 0) return null;
  const eased = Easing.easeOutBack(appearP);
  const grP = clamp((t - T.greenFlip[0]) / (T.greenFlip[1] - T.greenFlip[0]), 0, 1);
  const tone = grP > 0 ? lerpRGB(COLORS.blue, COLORS.green, grP) : COLORS.blue;
  const settled = grP >= 1;
  const NODE = 160;
  const { x, y } = nodeXY(0);

  return (
    <div style={{ position: 'absolute', left: x - NODE / 2, top: y - NODE / 2,
      width: NODE, height: NODE, opacity: appearP, transform: `scale(${eased})`, transformOrigin: 'center' }}>
      <div style={{ position: 'absolute', inset: -10, borderRadius: '50%', boxShadow: `0 0 40px ${rgb(tone, 0.35)}` }} />
      <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: '#0c0c10',
        border: `2.5px solid ${rgb(tone)}`, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center' }}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2.5" y="6" width="19" height="13" rx="2.5" stroke={rgb(tone)} strokeWidth="1.7" />
          <path d="M2.5 9 L16 9 L16 16 L21.5 16" stroke={rgb(tone)} strokeWidth="1.7" fill="none" strokeLinecap="round" />
          <circle cx="17.5" cy="12.5" r="1.3" fill={rgb(tone)} />
        </svg>
        <div style={{ marginTop: 8, fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 10.5,
          letterSpacing: '0.10em', color: '#f5f5f7', textTransform: 'uppercase', fontWeight: 600 }}>Your Wallet</div>
        <div style={{ marginTop: 2, fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 9.5,
          letterSpacing: '0.06em', color: '#6c6c72', textTransform: 'uppercase' }}>Origin · Receiver</div>
      </div>
      <div style={{ position: 'absolute', top: -38, left: '50%', transform: 'translateX(-50%)',
        whiteSpace: 'nowrap', padding: '5px 12px', borderRadius: 6,
        fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 10.5, letterSpacing: '0.08em',
        textTransform: 'uppercase', fontWeight: 600, background: rgb(tone, 0.12),
        border: `1px solid ${rgb(tone, 0.30)}`, color: rgb(tone) }}>
        {settled ? 'Received · 1,245,442 sats' : 'Sending · 1,248,300 sats'}
      </div>
    </div>
  );
}

function Maker({ data, hoverId, setHoverId }) {
  const t = useTime();
  const [a0, a1] = T.makerIn[data.id];
  const appearP = clamp((t - a0) / (a1 - a0), 0, 1);
  if (appearP <= 0) return null;
  const eased = Easing.easeOutBack(appearP);
  const { tone, hsP, ctP, grP } = makerProgress(t, data);
  const inBlink = t >= T.blinkStart && t < T.greenFlip[0] && ctP >= 1;
  const wobble = inBlink ? 0.5 + 0.5 * Math.sin((t - T.blinkStart) * Math.PI * 3) : 1;
  const baseOpacity = 0.35 + 0.65 * hsP;
  const opacity = baseOpacity * (inBlink ? (0.55 + 0.45 * wobble) : 1) * appearP;
  const blur = (1 - hsP) * 4.5;

  let statusLabel = 'Connecting…';
  if (hsP > 0 && hsP < 1) statusLabel = 'Handshaking';
  if (hsP >= 1 && ctP === 0) statusLabel = 'Handshake OK';
  if (ctP > 0 && ctP < 1) statusLabel = 'Locking HTLC';
  if (ctP >= 1 && grP === 0) statusLabel = 'HTLC Locked';
  if (grP > 0 && grP < 1) statusLabel = 'Releasing';
  if (grP >= 1) statusLabel = 'Settled';

  const NODE = 130;
  const { x, y } = nodeXY(data.angle);
  const isHover = hoverId === data.id;
  const scale = eased * (isHover ? 1.06 : 1);

  return (
    <div onMouseEnter={() => setHoverId(data.id)}
      onMouseLeave={() => setHoverId((h) => (h === data.id ? null : h))}
      style={{ position: 'absolute', left: x - NODE / 2, top: y - NODE / 2,
        width: NODE, height: NODE, cursor: 'pointer', zIndex: isHover ? 5 : 1 }}>
      <div style={{ position: 'absolute', inset: 0, opacity, transform: `scale(${scale})`,
        transformOrigin: 'center', filter: blur > 0.15 ? `blur(${blur}px)` : 'none',
        transition: 'transform 200ms ease' }}>
        <div style={{ position: 'absolute', inset: -10, borderRadius: '50%',
          boxShadow: `0 0 ${isHover ? 36 : 22}px ${rgb(tone, 0.45 * hsP)}`, pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: '#0c0c10',
          border: `2px solid ${rgb(tone)}`, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center' }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="5" width="16" height="6" rx="1.6" stroke={rgb(tone)} strokeWidth="1.6" />
            <rect x="4" y="13" width="16" height="6" rx="1.6" stroke={rgb(tone)} strokeWidth="1.6" />
            <circle cx="7" cy="8" r="0.9" fill={rgb(tone)} />
            <circle cx="7" cy="16" r="0.9" fill={rgb(tone)} />
            <path d="M11 8 H17" stroke={rgb(tone)} strokeWidth="1.4" strokeLinecap="round" />
            <path d="M11 16 H17" stroke={rgb(tone)} strokeWidth="1.4" strokeLinecap="round" />
          </svg>
          <div style={{ marginTop: 7, fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 10,
            letterSpacing: '0.10em', color: '#f5f5f7', textTransform: 'uppercase', fontWeight: 600 }}>{data.label}</div>
          <div style={{ marginTop: 1, fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 9,
            letterSpacing: '0.04em', color: '#6c6c72' }}>{data.tor.slice(0, 11)}…</div>
        </div>
      </div>
      <StatusPill side={data.tipSide} tone={tone} label={statusLabel} opacity={appearP} />
    </div>
  );
}

function StatusPill({ side, tone, label, opacity }) {
  const NODE = 130;
  let style = {};
  if (side === 'right')  style = { top: NODE + 14, left: '50%', transform: 'translateX(-50%)' };
  if (side === 'bottom') style = { top: -32,       left: '50%', transform: 'translateX(-50%)' };
  if (side === 'left')   style = { top: NODE + 14, left: '50%', transform: 'translateX(-50%)' };
  return (
    <div style={{ position: 'absolute', whiteSpace: 'nowrap', padding: '4px 11px', borderRadius: 6,
      fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 10, letterSpacing: '0.08em',
      textTransform: 'uppercase', fontWeight: 600, background: rgb(tone, 0.12),
      border: `1px solid ${rgb(tone, 0.32)}`, color: rgb(tone), opacity, pointerEvents: 'none', ...style }}>
      {label}
    </div>
  );
}

function MakerTooltip({ maker }) {
  const m = MAKERS.find((x) => x.id === maker);
  if (!m) return null;
  const { x, y } = nodeXY(m.angle);
  const TIP_W = 280, OFFSET = 100;
  let left, top, arrowSide;
  if (m.tipSide === 'right')       { left = x + OFFSET;           top = y - 68; arrowSide = 'left'; }
  else if (m.tipSide === 'left')   { left = x - OFFSET - TIP_W;  top = y - 68; arrowSide = 'right'; }
  else                              { left = x - TIP_W / 2;       top = y + OFFSET; arrowSide = 'top'; }

  const ArrowEl = () => {
    const base = { position: 'absolute', width: 0, height: 0, borderStyle: 'solid' };
    if (arrowSide === 'left')  return <span style={{ ...base, top: 64, left: -8, borderWidth: '8px 8px 8px 0', borderColor: 'transparent rgba(255,255,255,0.14) transparent transparent' }} />;
    if (arrowSide === 'right') return <span style={{ ...base, top: 64, right: -8, borderWidth: '8px 0 8px 8px', borderColor: 'transparent transparent transparent rgba(255,255,255,0.14)' }} />;
    return <span style={{ ...base, top: -8, left: 132, borderWidth: '0 8px 8px 8px', borderColor: 'transparent transparent rgba(255,255,255,0.14) transparent' }} />;
  };

  return (
    <div style={{ position: 'absolute', left, top, width: TIP_W, background: '#101014',
      border: '1px solid rgba(255,255,255,0.14)', borderRadius: 12, padding: '14px 16px',
      boxShadow: '0 20px 50px rgba(0,0,0,0.6)', pointerEvents: 'none',
      animation: 'sp-tipin 140ms ease-out', zIndex: 20 }}>
      <ArrowEl />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <span style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 11, letterSpacing: '0.10em',
          color: '#f5f5f7', fontWeight: 600, textTransform: 'uppercase' }}>{m.label}</span>
        <span style={{ padding: '2px 7px', borderRadius: 999, background: 'rgba(91,141,239,0.12)',
          border: '1px solid rgba(91,141,239,0.30)', color: '#7da3f5',
          fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 9, letterSpacing: '0.08em',
          textTransform: 'uppercase', fontWeight: 600 }}>Peer</span>
      </div>
      {[['Tor', m.tor], ['Fee', m.fee], ['Bond', m.bond]].map(([label, value]) => (
        <div key={label} style={{ display: 'flex', flexDirection: 'column', gap: 2,
          paddingTop: 8, paddingBottom: 8, borderTop: '1px dashed rgba(255,255,255,0.06)' }}>
          <div style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 9.5,
            letterSpacing: '0.10em', color: '#6c6c72', textTransform: 'uppercase' }}>{label}</div>
          <div style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 12,
            color: '#f5f5f7', letterSpacing: '-0.005em' }}>{value}</div>
        </div>
      ))}
    </div>
  );
}

function CenterStatus() {
  const t = useTime();
  const phase = currentPhase(t);
  let line1 = 'Awaiting handshakes', line2 = 'Negotiating with selected makers over Tor';
  if (phase.step === 2) { line1 = 'Locking funds in HTLC contracts'; line2 = 'Each maker stakes their fidelity bond'; }
  if (phase.step === 3) { line1 = 'Routing atomic swap'; line2 = 'Sats traversing the closed loop'; }
  if (t >= T.greenFlip[1]) { line1 = 'Preimage propagated'; line2 = 'Coins returned to your wallet'; }
  return (
    <div style={{ position: 'absolute', left: CX - 220, top: CY - 26, width: 440,
      textAlign: 'center', pointerEvents: 'none', opacity: 0.95 }}>
      <div style={{ fontFamily: '-apple-system, "SF Pro Display", sans-serif', fontSize: 18,
        fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.015em' }}>{line1}</div>
      <div style={{ marginTop: 6, fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 11.5,
        letterSpacing: '0.04em', color: '#6c6c72' }}>{line2}</div>
    </div>
  );
}

function CompleteBadge() {
  const t = useTime();
  const p = clamp((t - T.completeIn) / 0.7, 0, 1);
  if (p <= 0) return null;
  const eased = Easing.easeOutBack(p);
  return (
    <div style={{ position: 'absolute', left: CX - 130, top: CY + 70, width: 260,
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10,
      opacity: p, transform: `scale(${eased})`, transformOrigin: 'center' }}>
      <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'rgba(47,191,113,0.14)',
        border: '2px solid rgba(47,191,113,0.45)', display: 'flex', alignItems: 'center',
        justifyContent: 'center', position: 'relative' }}>
        <span style={{ position: 'absolute', inset: -6, borderRadius: '50%',
          border: '2px solid rgba(47,191,113,0.55)', animation: 'sp-ripple 2.4s ease-out infinite' }} />
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5 L10 17.5 L19 7" stroke="#2fbf71" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <div style={{ padding: '6px 14px', borderRadius: 999, background: 'rgba(47,191,113,0.12)',
        border: '1px solid rgba(47,191,113,0.32)', color: '#2fbf71',
        fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 12, letterSpacing: '0.10em',
        textTransform: 'uppercase', fontWeight: 700 }}>Swap complete</div>
    </div>
  );
}

function BottomStats() {
  const t = useTime();
  const phase = currentPhase(t);
  const etaSeconds = Math.round((Math.max(0, TOTAL_DURATION - t) / TOTAL_DURATION) * 167);
  const etaStr = t >= T.greenFlip[1] ? '0m 00s' : `${Math.floor(etaSeconds / 60)}m ${String(etaSeconds % 60).padStart(2,'0')}s`;
  const stats = [
    { label: 'Amount',      value: '1,248,300', unit: 'sats',  color: '#f5f5f7' },
    { label: 'Hops',        value: '3',         unit: 'peers', color: '#f5f5f7' },
    { label: 'Fee',         value: '2,858',     unit: 'sats',  color: '#f5f5f7' },
    { label: 'You receive', value: '1,245,442', unit: 'sats',  color: '#2fbf71' },
    { label: 'ETA',         value: etaStr,      unit: '',      color: phase.color },
  ];
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 40, display: 'flex', justifyContent: 'center' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, auto)', gap: 0,
        background: '#101014', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 14, padding: '14px 4px' }}>
        {stats.map((s, i) => (
          <div key={s.label} style={{ padding: '4px 28px',
            borderRight: i < stats.length - 1 ? '1px solid rgba(255,255,255,0.06)' : 'none',
            minWidth: 140, display: 'flex', flexDirection: 'column', gap: 4, alignItems: 'flex-start' }}>
            <div style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 10,
              letterSpacing: '0.12em', color: '#6c6c72', textTransform: 'uppercase' }}>{s.label}</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
              <span style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 20, fontWeight: 600,
                color: s.color, letterSpacing: '-0.01em', fontVariantNumeric: 'tabular-nums' }}>{s.value}</span>
              {s.unit && <span style={{ fontFamily: 'SF Mono, ui-monospace, monospace', fontSize: 11,
                color: '#6c6c72', letterSpacing: '0.04em' }}>{s.unit}</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Diagram() {
  const [hoverId, setHoverId] = React.useState(null);
  return (
    <React.Fragment>
      <RouteCircle hoverMaker={hoverId} />
      <CenterStatus />
      <CompleteBadge />
      <Wallet />
      {MAKERS.map((m) => <Maker key={m.id} data={m} hoverId={hoverId} setHoverId={setHoverId} />)}
      {hoverId && <MakerTooltip maker={hoverId} />}
    </React.Fragment>
  );
}

function App() {
  return (
    <React.Fragment>
      <style>{`
        @keyframes sp-pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
        @keyframes sp-fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        @keyframes sp-ripple { 0%{transform:scale(0.9);opacity:0.9} 100%{transform:scale(1.6);opacity:0} }
        @keyframes sp-tipin  { from{opacity:0;transform:translateY(2px)} to{opacity:1;transform:translateY(0)} }
      `}</style>
      <Stage width={STAGE_W} height={STAGE_H} duration={TOTAL_DURATION}
        background="#08080a" loop={false} autoplay={true} persistKey="swap-progress">
        <Backdrop />
        <Chrome />
        <Header />
        <Diagram />
        <BottomStats />
      </Stage>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
